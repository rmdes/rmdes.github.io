<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rMdes — Projects</title>
  <meta name="description" content="Independent web, Bluesky tooling, IndieWeb infrastructure.">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header class="masthead">
      <a class="brand" href="/">rMdes</a>
      <nav class="links" aria-label="external links"></nav>
    </header>

    <section class="intro" aria-labelledby="intro-heading">
      <h1 id="intro-heading"></h1>
    </section>

    <hr class="rule" />

    <section class="projects" aria-labelledby="projects-heading">
      <header class="section-label">
        <h2 id="projects-heading">Projects</h2>
        <span class="count"></span>
      </header>
      <ul class="project-grid"></ul>
    </section>

    <footer class="footer">
      <a href="https://github.com/rmdes/rmdes.github.io">view source on github</a>
    </footer>
  </main>
  <script src="./app.js" defer></script>
</body>
</html>
