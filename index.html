<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rMdes — Projects</title>
  <meta name="description" content="Independent web, Bluesky tooling, IndieWeb infrastructure.">
  <meta name="color-scheme" content="light dark">
  <script>
    // No-flash theme application — read stored override BEFORE CSS paints.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.dataset.theme = t;
        }
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header class="masthead">
      <a class="brand" href="/">rMdes</a>

        <nav class="links" aria-label="external links"></nav>
        <button class="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle color theme">

          </svg>
          <svg class="icon-light" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-1.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13ZM2.343 2.343a.75.75 0 0 1 1.061 0l1.06 1.06a.75.75 0 0 1-1.06 1.06l-1.06-1.06a.75.75 0 0 1 0-1.06Zm9.193 9.193a.75.75 0 0 1 1.06 0l1.061 1.061a.75.75 0 0 1-1.06 1.06l-1.061-1.06a.75.75 0 0 1 0-1.06ZM16 8a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm10.657-5.657a.75.75 0 0 1 0 1.061l-1.061 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0ZM4.464 11.536a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 0 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0Z"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="intro" aria-labelledby="intro-heading">
      <h1 id="intro-heading"></h1>
    </section>

    <section class="projects" aria-label="Projects">
      <div class="project-sections"></div>
    </section>

    <footer class="footer">
      <a href="https://github.com/rmdes/rmdes.github.io">view source on github</a>
    </footer>
  </main>
  <script src="./app.js" defer></script>
</body>
</html>
